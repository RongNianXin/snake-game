<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --bg-secondary: #111827;
            --fg: #e8ecf4;
            --muted: #4b5563;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --food: #f59e0b;
            --food-glow: rgba(245, 158, 11, 0.5);
            --danger: #ef4444;
            --card: rgba(17, 24, 39, 0.7);
            --border: rgba(75, 85, 99, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(16, 185, 129, 0.06), transparent),
                radial-gradient(ellipse 500px 500px at 80% 70%, rgba(245, 158, 11, 0.04), transparent),
                radial-gradient(ellipse 800px 600px at 50% 50%, rgba(16, 185, 129, 0.03), transparent);
        }

        .floating-orb {
            position: fixed; border-radius: 50%; filter: blur(80px);
            opacity: 0.15; animation: orbFloat 12s ease-in-out infinite; z-index: 0;
        }
        .floating-orb:nth-child(2) { width:300px;height:300px;background:var(--accent);top:10%;left:5%; }
        .floating-orb:nth-child(3) { width:250px;height:250px;background:var(--food);bottom:15%;right:10%;animation-delay:-4s;animation-duration:15s; }
        .floating-orb:nth-child(4) { width:200px;height:200px;background:#6366f1;top:60%;left:50%;animation-delay:-8s;animation-duration:18s;opacity:0.08; }

        @keyframes orbFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            25% { transform: translate(30px,-20px) scale(1.05); }
            50% { transform: translate(-20px,30px) scale(0.95); }
            75% { transform: translate(20px,20px) scale(1.02); }
        }

        .main-layout {
            position: relative; z-index: 10;
            display: flex; align-items: flex-start; gap: 28px;
        }

        .game-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            outline: none;
        }

        .info-bar {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; max-width: 520px; padding: 0 4px;
        }

        .score-display {
            display: flex; align-items: center; gap: 10px;
            background: var(--card); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 20px; transition: all 0.3s ease;
        }
        .score-display:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        .score-icon { color: var(--accent); font-size: 18px; }
        .score-label { color: var(--muted); font-size: 13px; font-weight: 300; text-transform: uppercase; letter-spacing: 1.5px; }
        .score-value { color: var(--fg); font-size: 28px; font-weight: 700; min-width: 50px; text-align: right; transition: transform 0.15s ease; }
        .score-value.bump { transform: scale(1.3); }

        .best-score {
            display: flex; align-items: center; gap: 8px;
            background: var(--card); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px; padding: 10px 18px;
        }
        .best-icon { color: var(--food); font-size: 16px; }
        .best-label { color: var(--muted); font-size: 12px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; }
        .best-value { color: var(--food); font-size: 22px; font-weight: 700; }

        .canvas-container {
            position: relative; border-radius: 16px; overflow: hidden;
            box-shadow: 0 0 0 1px var(--border), 0 0 40px rgba(16,185,129,0.08), 0 20px 60px rgba(0,0,0,0.5);
            transition: box-shadow 0.4s ease;
        }
        .canvas-container.active { box-shadow: 0 0 0 1px rgba(16,185,129,0.3), 0 0 60px rgba(16,185,129,0.12), 0 20px 60px rgba(0,0,0,0.5); }
        .canvas-container.dead { box-shadow: 0 0 0 1px rgba(239,68,68,0.4), 0 0 60px rgba(239,68,68,0.1), 0 20px 60px rgba(0,0,0,0.5); }

        canvas { display: block; background: var(--bg-secondary); }

        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(10,14,23,0.85); backdrop-filter: blur(8px);
            z-index: 20; transition: opacity 0.4s ease; border-radius: 16px;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }

        .overlay-title { font-size: 42px; font-weight: 700; margin-bottom: 8px; letter-spacing: -1px; }
        .overlay-title.accent { color: var(--accent); }
        .overlay-title.danger { color: var(--danger); }
        .overlay-subtitle { color: var(--muted); font-size: 15px; font-weight: 300; margin-bottom: 32px; letter-spacing: 0.5px; }

        .final-score-text { font-size: 18px; color: var(--muted); margin-bottom: 4px; }
        .final-score-number { font-size: 56px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }

        .new-record {
            color: var(--food); font-size: 14px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 28px;
            animation: recordPulse 1s ease-in-out infinite;
        }
        .new-record.hidden { display: none; }
        @keyframes recordPulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

        .game-btn {
            padding: 14px 40px; border: none; border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif; font-size: 16px;
            font-weight: 600; letter-spacing: 0.5px; cursor: pointer;
            transition: all 0.25s ease; outline: none;
        }
        .game-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
        .btn-primary { background: var(--accent); color: #0a0e17; box-shadow: 0 4px 20px var(--accent-glow); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px var(--accent-glow); filter: brightness(1.1); }
        .btn-primary:active { transform: translateY(0); }

        .controls-hint { display: flex; align-items: center; gap: 20px; color: var(--muted); font-size: 13px; font-weight: 300; }
        .key-group { display: flex; align-items: center; gap: 6px; }
        .key {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; background: var(--card);
            border: 1px solid var(--border); border-radius: 6px;
            font-size: 12px; color: var(--fg); backdrop-filter: blur(8px);
        }
        .key i { font-size: 10px; }
        .key.wide { width: auto; padding: 0 10px; font-size: 11px; }

        .focus-hint { color: var(--muted); font-size: 12px; font-weight: 300; margin-top: -8px; opacity: 0.7; transition: opacity 0.3s ease; }
        .focus-hint.hidden { opacity: 0; }

        .mobile-controls { display: none; grid-template-columns: repeat(3,56px); grid-template-rows: repeat(2,56px); gap: 6px; margin-top: 8px; }
        .mobile-btn {
            display: flex; align-items: center; justify-content: center;
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            color: var(--fg); font-size: 20px; cursor: pointer;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
            transition: all 0.15s ease;
        }
        .mobile-btn:active { background: var(--accent); color: var(--bg); transform: scale(0.92); }
        .mobile-btn.empty { background: transparent; border: none; }

        @media (max-width: 600px) {
            .mobile-controls { display: grid; }
            .controls-hint { display: none; }
        }

        .snake-deco { display: flex; gap: 4px; margin-bottom: 24px; }
        .snake-deco span { width: 12px; height: 12px; border-radius: 3px; animation: snakeWave 1.5s ease-in-out infinite; }
        .snake-deco span:nth-child(1) { background: #10b981; animation-delay: 0s; }
        .snake-deco span:nth-child(2) { background: #0d9668; animation-delay: 0.1s; }
        .snake-deco span:nth-child(3) { background: #0a7d56; animation-delay: 0.2s; }
        .snake-deco span:nth-child(4) { background: #086444; animation-delay: 0.3s; }
        .snake-deco span:nth-child(5) { background: #064b33; animation-delay: 0.4s; }
        @keyframes snakeWave { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .toast {
            position: fixed; top: 24px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--card); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 24px; color: var(--fg); font-size: 14px;
            z-index: 100; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* 右侧得分历史面板 */
        .history-panel {
            width: 240px; min-height: 200px;
            background: var(--card); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 16px;
            padding: 20px; display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: border-color 0.3s ease;
        }
        .history-panel:hover { border-color: rgba(75,85,99,0.5); }

        .history-header {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .history-header i { color: var(--food); font-size: 16px; }
        .history-title { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
        .history-count { color: var(--muted); font-size: 12px; font-weight: 300; margin-left: auto; }

        .history-list {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
            max-height: 420px; min-height: 100px;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .history-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; border-radius: 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            transition: all 0.25s ease;
            animation: itemSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1) backwards;
        }
        .history-item:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }

        .history-item.is-best {
            background: rgba(245,158,11,0.06);
            border-color: rgba(245,158,11,0.2);
        }
        .history-item.is-best:hover { background: rgba(245,158,11,0.1); }

        .item-rank {
            width: 24px; height: 24px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; flex-shrink: 0;
            background: rgba(255,255,255,0.05); color: var(--muted);
        }
        .history-item.is-best .item-rank {
            background: rgba(245,158,11,0.15); color: var(--food);
        }

        .item-info { flex: 1; }
        .item-round { font-size: 12px; color: var(--muted); font-weight: 300; }
        .item-score { font-size: 18px; font-weight: 700; color: var(--fg); line-height: 1.2; }
        .history-item.is-best .item-score { color: var(--food); }

        .item-crown { color: var(--food); font-size: 12px; flex-shrink: 0; }
        .item-crown.hidden { display: none; }

        .history-empty {
            text-align: center; padding: 32px 0;
            color: var(--muted); font-size: 13px; font-weight: 300;
        }
        .history-empty i { font-size: 28px; display: block; margin-bottom: 10px; opacity: 0.3; }

        @keyframes itemSlideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 860px) {
            .main-layout { flex-direction: column; align-items: center; }
            .history-panel { width: 100%; max-width: 520px; min-height: auto; }
            .history-list { max-height: 180px; flex-direction: row; flex-wrap: wrap; gap: 6px; overflow-x: auto; }
            .history-item { min-width: 120px; flex-shrink: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .floating-orb, .snake-deco span { animation: none; }
            .canvas-container, .score-display, .game-btn, .history-item { transition: none; animation: none; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="floating-orb"></div>
    <div class="floating-orb"></div>
    <div class="floating-orb"></div>

    <div class="toast" id="toast"></div>

    <div class="main-layout">
        <div class="game-wrapper" id="gameWrapper" tabindex="0">
            <div class="info-bar">
                <div class="score-display">
                    <i class="fas fa-bolt score-icon"></i>
                    <div>
                        <div class="score-label">得分</div>
                        <div class="score-value" id="scoreValue">0</div>
                    </div>
                </div>
                <div class="best-score">
                    <i class="fas fa-crown best-icon"></i>
                    <div>
                        <div class="best-label">最高</div>
                        <div class="best-value" id="bestValue">0</div>
                    </div>
                </div>
            </div>

            <div class="canvas-container" id="canvasContainer">
                <canvas id="gameCanvas"></canvas>

                <div class="overlay" id="startOverlay">
                    <div class="snake-deco">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                    <div class="overlay-title accent">贪吃蛇</div>
                    <div class="overlay-subtitle">吞噬一切，不断进化</div>
                    <button class="game-btn btn-primary" id="startBtn" aria-label="开始游戏">开始游戏</button>
                </div>

                <div class="overlay hidden" id="gameOverOverlay">
                    <div class="overlay-title danger">游戏结束</div>
                    <div class="final-score-text">最终得分</div>
                    <div class="final-score-number" id="finalScore">0</div>
                    <div class="new-record hidden" id="newRecord">新纪录</div>
                    <button class="game-btn btn-primary" id="restartBtn" aria-label="重新开始">再来一局</button>
                </div>
            </div>

            <div class="focus-hint" id="focusHint">点击游戏区域以激活键盘控制</div>

            <div class="controls-hint">
                <div class="key-group">
                    <span class="key"><i class="fas fa-arrow-up"></i></span>
                    <span class="key"><i class="fas fa-arrow-down"></i></span>
                    <span class="key"><i class="fas fa-arrow-left"></i></span>
                    <span class="key"><i class="fas fa-arrow-right"></i></span>
                    <span style="margin-left:4px">移动</span>
                </div>
                <div class="key-group">
                    <span class="key wide">Space</span>
                    <span>暂停</span>
                </div>
            </div>

            <div class="mobile-controls" id="mobileControls">
                <div class="mobile-btn empty"></div>
                <div class="mobile-btn" data-dir="up"><i class="fas fa-chevron-up"></i></div>
                <div class="mobile-btn empty"></div>
                <div class="mobile-btn" data-dir="left"><i class="fas fa-chevron-left"></i></div>
                <div class="mobile-btn" data-dir="down"><i class="fas fa-chevron-down"></i></div>
                <div class="mobile-btn" data-dir="right"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>

        <div class="history-panel">
            <div class="history-header">
                <i class="fas fa-scroll"></i>
                <span class="history-title">得分记录</span>
                <span class="history-count" id="historyCount">0 局</span>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">
                    <i class="fas fa-ghost"></i>
                    还没有记录，开始第一局吧
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            // ===== 游戏配置 =====
            const GRID_COUNT = 20;
            const CELL_SIZE = 25;
            const CANVAS_SIZE = GRID_COUNT * CELL_SIZE;
            const INITIAL_SPEED = 220;
            const SPEED_MIN = 110;
            const SPEED_STEP = 2;

            // ===== DOM 元素 =====
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const canvasContainer = document.getElementById('canvasContainer');
            const startOverlay = document.getElementById('startOverlay');
            const gameOverOverlay = document.getElementById('gameOverOverlay');
            const startBtn = document.getElementById('startBtn');
            const restartBtn = document.getElementById('restartBtn');
            const scoreValue = document.getElementById('scoreValue');
            const bestValue = document.getElementById('bestValue');
            const finalScore = document.getElementById('finalScore');
            const newRecord = document.getElementById('newRecord');
            const toastEl = document.getElementById('toast');
            const gameWrapper = document.getElementById('gameWrapper');
            const focusHint = document.getElementById('focusHint');
            const historyList = document.getElementById('historyList');
            const historyCount = document.getElementById('historyCount');

            canvas.width = CANVAS_SIZE;
            canvas.height = CANVAS_SIZE;

            // ===== 游戏状态 =====
            let snake = [];
            let food = { x: 0, y: 0 };
            let direction = { x: 1, y: 0 };
            let nextDirection = { x: 1, y: 0 };
            let score = 0;
            let bestScore = 0;
            let gameRunning = false;
            let gamePaused = false;
            let gameLoop = null;
            let speed = INITIAL_SPEED;
            let particles = [];
            let foodPulse = 0;

            let scoreHistory = [];
            let roundNumber = 0;

            // 安全读取本地存储
            try {
                bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
                if (isNaN(bestScore)) bestScore = 0;
            } catch (e) { bestScore = 0; }

            try {
                const saved = localStorage.getItem('snakeHistory');
                if (saved) {
                    scoreHistory = JSON.parse(saved);
                    if (!Array.isArray(scoreHistory)) scoreHistory = [];
                }
                const savedRound = localStorage.getItem('snakeRound');
                if (savedRound) roundNumber = parseInt(savedRound) || 0;
            } catch (e) { scoreHistory = []; roundNumber = 0; }

            bestValue.textContent = bestScore;
            if (scoreHistory.length > 0) renderHistory();

            // ===== 聚焦管理 =====
            gameWrapper.addEventListener('click', () => gameWrapper.focus());
            canvasContainer.addEventListener('click', () => gameWrapper.focus());
            gameWrapper.addEventListener('focus', () => focusHint.classList.add('hidden'));
            gameWrapper.addEventListener('blur', () => {
                if (gameRunning && !gamePaused) focusHint.classList.remove('hidden');
            });

            // ===== 工具函数 =====
            function showToast(msg) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                setTimeout(() => toastEl.classList.remove('show'), 2000);
            }

            function randomGridPos() {
                return { x: Math.floor(Math.random() * GRID_COUNT), y: Math.floor(Math.random() * GRID_COUNT) };
            }

            function isOnSnake(pos) {
                return snake.some(s => s.x === pos.x && s.y === pos.y);
            }

            function spawnFood() {
                let pos, attempts = 0;
                do { pos = randomGridPos(); attempts++; }
                while (isOnSnake(pos) && attempts < 1000);
                food = pos;
            }

            // ===== 得分历史 =====
            function renderHistory() {
                historyList.innerHTML = '';
                if (scoreHistory.length === 0) {
                    historyList.innerHTML = '<div class="history-empty"><i class="fas fa-ghost"></i>还没有记录，开始第一局吧</div>';
                    historyCount.textContent = '0 局';
                    return;
                }
                const highestScore = Math.max(...scoreHistory.map(h => h.score));
                const sorted = [...scoreHistory].reverse();

                sorted.forEach((entry, idx) => {
                    const isBest = entry.score === highestScore && entry.score > 0;
                    const item = document.createElement('div');
                    item.className = 'history-item' + (isBest ? ' is-best' : '');
                    item.style.animationDelay = (idx * 0.04) + 's';
                    const rank = scoreHistory.filter(e => e.score > entry.score).length + 1;
                    item.innerHTML = `
                        <div class="item-rank">${rank}</div>
                        <div class="item-info">
                            <div class="item-round">第 ${entry.round} 局</div>
                            <div class="item-score">${entry.score}</div>
                        </div>
                        <i class="fas fa-crown item-crown ${isBest ? '' : 'hidden'}"></i>
                    `;
                    historyList.appendChild(item);
                });
                historyCount.textContent = scoreHistory.length + ' 局';
            }

            function addScoreToHistory(finalScore) {
                roundNumber++;
                const entry = { round: roundNumber, score: finalScore, time: Date.now() };
                scoreHistory.push(entry);
                if (scoreHistory.length > 50) scoreHistory = scoreHistory.slice(-50);
                try {
                    localStorage.setItem('snakeHistory', JSON.stringify(scoreHistory));
                    localStorage.setItem('snakeRound', roundNumber.toString());
                } catch (e) {}
                renderHistory();
            }

            // ===== 粒子系统 =====
            function createParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
                    const spd = 1.5 + Math.random() * 3;
                    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 1, decay: 0.02+Math.random()*0.03, size: 2+Math.random()*3, color });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles() {
                particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
            }

            // ===== 渲染 =====
            function drawGrid() {
                ctx.strokeStyle = 'rgba(75, 85, 99, 0.08)';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= GRID_COUNT; i++) {
                    const pos = i * CELL_SIZE;
                    ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, CANVAS_SIZE); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(CANVAS_SIZE, pos); ctx.stroke();
                }
            }

            function drawSnake() {
                const len = snake.length;
                snake.forEach((seg, i) => {
                    const ratio = i / Math.max(1, len - 1);
                    const x = seg.x * CELL_SIZE, y = seg.y * CELL_SIZE;
                    const padding = i === 0 ? 1 : 2, radius = i === 0 ? 6 : 4;
                    const r = Math.round(16+(6-16)*ratio), g = Math.round(185+(75-185)*ratio), b = Math.round(129+(51-129)*ratio);

                    ctx.save();
                    if (i === 0) { ctx.shadowColor = 'rgba(16,185,129,0.6)'; ctx.shadowBlur = 12; }
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    const cx = x+padding, cy = y+padding, cw = CELL_SIZE-padding*2, ch = CELL_SIZE-padding*2;
                    ctx.beginPath();
                    ctx.moveTo(cx+radius,cy); ctx.lineTo(cx+cw-radius,cy);
                    ctx.quadraticCurveTo(cx+cw,cy,cx+cw,cy+radius); ctx.lineTo(cx+cw,cy+ch-radius);
                    ctx.quadraticCurveTo(cx+cw,cy+ch,cx+cw-radius,cy+ch); ctx.lineTo(cx+radius,cy+ch);
                    ctx.quadraticCurveTo(cx,cy+ch,cx,cy+ch-radius); ctx.lineTo(cx,cy+radius);
                    ctx.quadraticCurveTo(cx,cy,cx+radius,cy); ctx.closePath(); ctx.fill();

                    if (i === 0) {
                        ctx.shadowBlur = 0; ctx.fillStyle = '#0a0e17';
                        const cX = x+CELL_SIZE/2, cY = y+CELL_SIZE/2;
                        let ex1,ey1,ex2,ey2;
                        if (direction.x===1){ex1=cX+4;ey1=cY-5;ex2=cX+4;ey2=cY+5;}
                        else if(direction.x===-1){ex1=cX-4;ey1=cY-5;ex2=cX-4;ey2=cY+5;}
                        else if(direction.y===-1){ex1=cX-5;ey1=cY-4;ex2=cX+5;ey2=cY-4;}
                        else{ex1=cX-5;ey1=cY+4;ex2=cX+5;ey2=cY+4;}
                        ctx.beginPath();ctx.arc(ex1,ey1,3,0,Math.PI*2);ctx.fill();
                        ctx.beginPath();ctx.arc(ex2,ey2,3,0,Math.PI*2);ctx.fill();
                        ctx.fillStyle='#e8ecf4';
                        ctx.beginPath();ctx.arc(ex1+1,ey1-1,1.2,0,Math.PI*2);ctx.fill();
                        ctx.beginPath();ctx.arc(ex2+1,ey2-1,1.2,0,Math.PI*2);ctx.fill();
                    }
                    ctx.restore();
                });
            }

            function drawFood() {
                foodPulse += 0.06;
                const x = food.x*CELL_SIZE+CELL_SIZE/2, y = food.y*CELL_SIZE+CELL_SIZE/2;
                const baseR = CELL_SIZE/2-4, pulseR = baseR+Math.sin(foodPulse)*2;
                ctx.save();
                const gg = ctx.createRadialGradient(x,y,0,x,y,CELL_SIZE);
                gg.addColorStop(0,'rgba(245,158,11,0.25)'); gg.addColorStop(1,'rgba(245,158,11,0)');
                ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(x,y,CELL_SIZE,0,Math.PI*2); ctx.fill();
                ctx.shadowColor='rgba(245,158,11,0.8)'; ctx.shadowBlur=15;
                const fg = ctx.createRadialGradient(x-2,y-2,0,x,y,pulseR);
                fg.addColorStop(0,'#fbbf24'); fg.addColorStop(1,'#f59e0b');
                ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(x,y,Math.max(1,pulseR),0,Math.PI*2); ctx.fill();
                ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.4)';
                ctx.beginPath(); ctx.arc(x-2,y-2,Math.max(0.5,pulseR*0.35),0,Math.PI*2); ctx.fill();
                ctx.restore();
            }

            function render() {
                ctx.fillStyle = '#111827';
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                drawGrid();
                if (gameRunning || particles.length > 0) {
                    if (gameRunning) drawFood();
                    drawSnake(); drawParticles(); updateParticles();
                }
                if (gamePaused) {
                    ctx.fillStyle = 'rgba(10,14,23,0.6)';
                    ctx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
                    ctx.fillStyle = '#e8ecf4';
                    ctx.font = '600 28px "Space Grotesk"';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('已暂停', CANVAS_SIZE/2, CANVAS_SIZE/2);
                    ctx.font = '300 14px "Space Grotesk"';
                    ctx.fillStyle = '#4b5563';
                    ctx.fillText('按空格继续', CANVAS_SIZE/2, CANVAS_SIZE/2+30);
                }
                requestAnimationFrame(render);
            }

            // ===== 游戏逻辑 =====
            function initGame() {
                const sx = Math.floor(GRID_COUNT/4), sy = Math.floor(GRID_COUNT/2);
                snake = [{x:sx,y:sy},{x:sx-1,y:sy},{x:sx-2,y:sy}];
                direction = {x:1,y:0}; nextDirection = {x:1,y:0};
                score = 0; speed = INITIAL_SPEED; particles = []; foodPulse = 0;
                scoreValue.textContent = '0';
                spawnFood();
            }

            function step() {
                if (!gameRunning || gamePaused) return;
                direction = {...nextDirection};
                const head = {x:snake[0].x+direction.x, y:snake[0].y+direction.y};
                if (head.x<0||head.x>=GRID_COUNT||head.y<0||head.y>=GRID_COUNT) { gameOver(); return; }
                if (isOnSnake(head)) { gameOver(); return; }
                snake.unshift(head);
                if (head.x===food.x && head.y===food.y) {
                    score++;
                    scoreValue.textContent = score;
                    scoreValue.classList.add('bump');
                    setTimeout(()=>scoreValue.classList.remove('bump'),150);
                    createParticles(food.x*CELL_SIZE+CELL_SIZE/2, food.y*CELL_SIZE+CELL_SIZE/2, '#f59e0b', 12);
                    createParticles(food.x*CELL_SIZE+CELL_SIZE/2, food.y*CELL_SIZE+CELL_SIZE/2, '#fbbf24', 8);
                    speed = Math.max(SPEED_MIN, speed-SPEED_STEP);
                    clearInterval(gameLoop); gameLoop = setInterval(step, speed);
                    spawnFood();
                } else { snake.pop(); }
            }

            function gameOver() {
                gameRunning = false;
                clearInterval(gameLoop);
                canvasContainer.classList.remove('active');
                canvasContainer.classList.add('dead');
                createParticles(snake[0].x*CELL_SIZE+CELL_SIZE/2, snake[0].y*CELL_SIZE+CELL_SIZE/2, '#ef4444', 20);
                createParticles(snake[0].x*CELL_SIZE+CELL_SIZE/2, snake[0].y*CELL_SIZE+CELL_SIZE/2, '#f87171', 10);
                addScoreToHistory(score);
                let isNewRecord = false;
                if (score > bestScore) {
                    bestScore = score;
                    try { localStorage.setItem('snakeBest', bestScore.toString()); } catch(e){}
                    bestValue.textContent = bestScore;
                    isNewRecord = true;
                }
                setTimeout(()=>{
                    finalScore.textContent = score;
                    if (isNewRecord && score > 0) newRecord.classList.remove('hidden');
                    else newRecord.classList.add('hidden');
                    gameOverOverlay.classList.remove('hidden');
                }, 600);
            }

            function startGame() {
                initGame();
                startOverlay.classList.add('hidden');
                gameOverOverlay.classList.add('hidden');
                canvasContainer.classList.remove('dead');
                canvasContainer.classList.add('active');
                gameRunning = true; gamePaused = false;
                focusHint.classList.add('hidden');
                gameLoop = setInterval(step, speed);
                gameWrapper.focus();
            }

            // ===== 暂停/继续 =====
            function togglePause() {
                if (!gameRunning) return;
                gamePaused = !gamePaused;
                if (gamePaused) {
                    clearInterval(gameLoop);
                    showToast('游戏已暂停');
                } else {
                    gameLoop = setInterval(step, speed);
                    showToast('继续游戏');
                }
            }

            // ===== 输入处理 =====
            function handleDirection(dir) {
                if (!gameRunning || gamePaused) return;
                const opposites = {up:'down',down:'up',left:'right',right:'left'};
                const dirMap = {up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
                const newDir = dirMap[dir]; if (!newDir) return;
                const cur = Object.keys(dirMap).find(k=>dirMap[k].x===direction.x&&dirMap[k].y===direction.y);
                if (opposites[dir]===cur) return;
                nextDirection = {...newDir};
            }

            // 统一的键盘处理函数
            function handleKey(e) {
                const dirMap = {
                    'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right',
                    'w':'up','s':'down','a':'left','d':'right','W':'up','S':'down','A':'left','D':'right'
                };

                // 空格：运行中切换暂停，未运行时开始
                if (e.key === ' ') {
                    e.preventDefault();
                    if (gameRunning) togglePause();
                    else startGame();
                    return;
                }

                if (dirMap[e.key]) {
                    e.preventDefault();
                    handleDirection(dirMap[e.key]);
                    return;
                }

                if (e.key === 'p' || e.key === 'P') {
                    if (gameRunning) togglePause();
                }
            }

            // 关键修复：gameWrapper 拦截事件后阻止冒泡，防止 document 重复处理
            gameWrapper.addEventListener('keydown', (e) => {
                handleKey(e);
                e.stopPropagation();
            });

            // document 作为后备，只在 gameWrapper 没有焦点时生效
            document.addEventListener('keydown', handleKey);

            // 移动端触控
            document.querySelectorAll('.mobile-btn[data-dir]').forEach(btn => {
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleDirection(btn.dataset.dir); });
                btn.addEventListener('click', () => handleDirection(btn.dataset.dir));
            });

            startBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(); });
            restartBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(); });

            let touchStartX = 0, touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => { touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; }, {passive:true});
            canvas.addEventListener('touchend', (e) => {
                const dx=e.changedTouches[0].clientX-touchStartX, dy=e.changedTouches[0].clientY-touchStartY;
                if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
                if(Math.abs(dx)>Math.abs(dy)) handleDirection(dx>0?'right':'left');
                else handleDirection(dy>0?'down':'up');
            }, {passive:true});

            render();
        })();
    </script>
</body>
</html>
