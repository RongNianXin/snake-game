<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 v1.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --bg-secondary: #111827;
            --fg: #e8ecf4;
            --muted: #4b5563;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --food: #f59e0b;
            --food-glow: rgba(245, 158, 11, 0.5);
            --danger: #ef4444;
            --card: rgba(17, 24, 39, 0.7);
            --border: rgba(75, 85, 99, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--fg);
            min-height: 100vh; overflow-x: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(16,185,129,0.06), transparent),
                radial-gradient(ellipse 500px 500px at 80% 70%, rgba(245,158,11,0.04), transparent),
                radial-gradient(ellipse 800px 600px at 50% 50%, rgba(16,185,129,0.03), transparent);
        }
        .floating-orb {
            position: fixed; border-radius: 50%; filter: blur(80px);
            opacity: 0.15; animation: orbFloat 12s ease-in-out infinite; z-index: 0;
        }
        .floating-orb:nth-child(2) { width:300px;height:300px;background:var(--accent);top:10%;left:5%; }
        .floating-orb:nth-child(3) { width:250px;height:250px;background:var(--food);bottom:15%;right:10%;animation-delay:-4s;animation-duration:15s; }
        .floating-orb:nth-child(4) { width:200px;height:200px;background:#6366f1;top:60%;left:50%;animation-delay:-8s;animation-duration:18s;opacity:0.08; }
        @keyframes orbFloat {
            0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(30px,-20px) scale(1.05)}
            50%{transform:translate(-20px,30px) scale(0.95)} 75%{transform:translate(20px,20px) scale(1.02)}
        }
        .main-layout { position:relative;z-index:10;display:flex;align-items:flex-start;gap:28px; }
        .game-wrapper { display:flex;flex-direction:column;align-items:center;gap:16px;outline:none; }
        .info-bar { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:520px;padding:0 4px; }
        .score-display {
            display:flex;align-items:center;gap:10px;background:var(--card);backdrop-filter:blur(12px);
            border:1px solid var(--border);border-radius:12px;padding:10px 20px;transition:all .3s ease;
        }
        .score-display:hover { border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow); }
        .score-icon { color:var(--accent);font-size:18px; }
        .score-label { color:var(--muted);font-size:13px;font-weight:300;text-transform:uppercase;letter-spacing:1.5px; }
        .score-value { color:var(--fg);font-size:28px;font-weight:700;min-width:50px;text-align:right;transition:transform .15s ease; }
        .score-value.bump { transform:scale(1.3); }
        .best-score {
            display:flex;align-items:center;gap:8px;background:var(--card);backdrop-filter:blur(12px);
            border:1px solid var(--border);border-radius:12px;padding:10px 18px;
        }
        .best-icon { color:var(--food);font-size:16px; }
        .best-label { color:var(--muted);font-size:12px;font-weight:300;text-transform:uppercase;letter-spacing:1px; }
        .best-value { color:var(--food);font-size:22px;font-weight:700; }
        .difficulty-bar { display:flex;align-items:center;gap:10px;width:100%;max-width:520px;padding:0 4px; }
        .difficulty-label { color:var(--muted);font-size:13px;font-weight:300;text-transform:uppercase;letter-spacing:1px;white-space:nowrap; }
        .difficulty-group { display:flex;gap:6px;flex:1; }
        .diff-btn {
            flex:1;padding:8px 0;border:1px solid var(--border);border-radius:10px;background:var(--card);
            color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;
            cursor:pointer;transition:all .25s ease;outline:none;backdrop-filter:blur(12px);text-align:center;
        }
        .diff-btn:hover { border-color:rgba(255,255,255,.2);color:var(--fg); }
        .diff-btn.active-easy { background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.4);color:#34d399;box-shadow:0 0 16px rgba(16,185,129,.15); }
        .diff-btn.active-normal { background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:#fbbf24;box-shadow:0 0 16px rgba(245,158,11,.15); }
        .diff-btn.active-hard { background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#f87171;box-shadow:0 0 16px rgba(239,68,68,.15); }
        .diff-btn:focus-visible { outline:2px solid var(--accent);outline-offset:2px; }
        .diff-info { font-size:11px;font-weight:300;opacity:.7;display:block;margin-top:1px; }
        .canvas-container {
            position:relative;border-radius:16px;overflow:hidden;
            box-shadow:0 0 0 1px var(--border),0 0 40px rgba(16,185,129,.08),0 20px 60px rgba(0,0,0,.5);
            transition:box-shadow .4s ease;
        }
        .canvas-container.active { box-shadow:0 0 0 1px rgba(16,185,129,.3),0 0 60px rgba(16,185,129,.12),0 20px 60px rgba(0,0,0,.5); }
        .canvas-container.dead { box-shadow:0 0 0 1px rgba(239,68,68,.4),0 0 60px rgba(239,68,68,.1),0 20px 60px rgba(0,0,0,.5); }
        canvas { display:block;background:var(--bg-secondary); }
        .overlay {
            position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
            background:rgba(10,14,23,.85);backdrop-filter:blur(8px);z-index:20;transition:opacity .4s ease;border-radius:16px;
        }
        .overlay.hidden { opacity:0;pointer-events:none; }
        .overlay-title { font-size:42px;font-weight:700;margin-bottom:8px;letter-spacing:-1px; }
        .overlay-title.accent { color:var(--accent); }
        .overlay-title.danger { color:var(--danger); }
        .overlay-subtitle { color:var(--muted);font-size:15px;font-weight:300;margin-bottom:32px;letter-spacing:.5px; }
        .final-score-text { font-size:18px;color:var(--muted);margin-bottom:4px; }
        .final-score-number { font-size:56px;font-weight:700;color:var(--accent);margin-bottom:8px; }
        .final-difficulty { font-size:14px;color:var(--muted);font-weight:300;margin-bottom:16px; }
        .new-record { color:var(--food);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:28px;animation:recordPulse 1s ease-in-out infinite; }
        .new-record.hidden { display:none; }
        @keyframes recordPulse { 0%,100%{opacity:1}50%{opacity:.5} }
        .game-btn {
            padding:14px 40px;border:none;border-radius:12px;font-family:'Space Grotesk',sans-serif;
            font-size:16px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .25s ease;outline:none;
        }
        .game-btn:focus-visible { outline:2px solid var(--accent);outline-offset:3px; }
        .btn-primary { background:var(--accent);color:#0a0e17;box-shadow:0 4px 20px var(--accent-glow); }
        .btn-primary:hover { transform:translateY(-2px);box-shadow:0 6px 30px var(--accent-glow);filter:brightness(1.1); }
        .btn-primary:active { transform:translateY(0); }
        .controls-hint { display:flex;align-items:center;gap:20px;color:var(--muted);font-size:13px;font-weight:300; }
        .key-group { display:flex;align-items:center;gap:6px; }
        .key {
            display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;
            background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--fg);backdrop-filter:blur(8px);
        }
        .key i { font-size:10px; }
        .key.wide { width:auto;padding:0 10px;font-size:11px; }
        .focus-hint { color:var(--muted);font-size:12px;font-weight:300;margin-top:-8px;opacity:.7;transition:opacity .3s ease; }
        .focus-hint.hidden { opacity:0; }
        .mobile-controls { display:none;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(2,56px);gap:6px;margin-top:8px; }
        .mobile-btn {
            display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);
            border-radius:12px;color:var(--fg);font-size:20px;cursor:pointer;user-select:none;-webkit-user-select:none;
            touch-action:manipulation;transition:all .15s ease;
        }
        .mobile-btn:active { background:var(--accent);color:var(--bg);transform:scale(.92); }
        .mobile-btn.empty { background:transparent;border:none; }
        @media(max-width:600px){ .mobile-controls{display:grid} .controls-hint{display:none} }
        .snake-deco { display:flex;gap:4px;margin-bottom:24px; }
        .snake-deco span { width:12px;height:12px;border-radius:3px;animation:snakeWave 1.5s ease-in-out infinite; }
        .snake-deco span:nth-child(1){background:#10b981;animation-delay:0s}
        .snake-deco span:nth-child(2){background:#0d9668;animation-delay:.1s}
        .snake-deco span:nth-child(3){background:#0a7d56;animation-delay:.2s}
        .snake-deco span:nth-child(4){background:#086444;animation-delay:.3s}
        .snake-deco span:nth-child(5){background:#064b33;animation-delay:.4s}
        @keyframes snakeWave { 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)} }
        .toast {
            position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);
            background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:10px;
            padding:10px 24px;color:var(--fg);font-size:14px;z-index:100;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .history-panel {
            width:240px;min-height:200px;background:var(--card);backdrop-filter:blur(12px);
            border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;
            box-shadow:0 8px 32px rgba(0,0,0,.3);transition:border-color .3s ease;
        }
        .history-panel:hover { border-color:rgba(75,85,99,.5); }
        .history-header { display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border); }
        .history-header i { color:var(--food);font-size:16px; }
        .history-title { font-size:15px;font-weight:600;letter-spacing:.5px; }
        .history-count { color:var(--muted);font-size:12px;font-weight:300;margin-left:auto; }
        .history-list {
            flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;max-height:420px;min-height:100px;
            scrollbar-width:thin;scrollbar-color:var(--border) transparent;
        }
        .history-list::-webkit-scrollbar{width:4px}
        .history-list::-webkit-scrollbar-track{background:transparent}
        .history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
        .history-item {
            display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;
            background:rgba(255,255,255,.02);border:1px solid transparent;transition:all .25s ease;
            animation:itemSlideIn .35s cubic-bezier(.34,1.56,.64,1) backwards;
        }
        .history-item:hover { background:rgba(255,255,255,.04);border-color:var(--border); }
        .history-item.is-best { background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2); }
        .history-item.is-best:hover { background:rgba(245,158,11,.1); }
        .item-rank {
            width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;
            font-size:11px;font-weight:600;flex-shrink:0;background:rgba(255,255,255,.05);color:var(--muted);
        }
        .history-item.is-best .item-rank { background:rgba(245,158,11,.15);color:var(--food); }
        .item-info { flex:1; }
        .item-round { font-size:12px;color:var(--muted);font-weight:300; }
        .item-score { font-size:18px;font-weight:700;color:var(--fg);line-height:1.2; }
        .history-item.is-best .item-score { color:var(--food); }
        .item-difficulty { font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px; }
        .item-difficulty.easy { background:rgba(16,185,129,.12);color:#34d399; }
        .item-difficulty.normal { background:rgba(245,158,11,.12);color:#fbbf24; }
        .item-difficulty.hard { background:rgba(239,68,68,.12);color:#f87171; }
        .item-crown { color:var(--food);font-size:12px;flex-shrink:0; }
        .item-crown.hidden { display:none; }
        .history-empty { text-align:center;padding:32px 0;color:var(--muted);font-size:13px;font-weight:300; }
        .history-empty i { font-size:28px;display:block;margin-bottom:10px;opacity:.3; }
        @keyframes itemSlideIn { from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)} }
        @media(max-width:860px){
            .main-layout{flex-direction:column;align-items:center}
            .history-panel{width:100%;max-width:520px;min-height:auto}
            .history-list{max-height:180px;flex-direction:row;flex-wrap:wrap;gap:6px;overflow-x:auto}
            .history-item{min-width:120px;flex-shrink:0}
        }
        @media(prefers-reduced-motion:reduce){
            .floating-orb,.snake-deco span{animation:none}
            .canvas-container,.score-display,.game-btn,.history-item,.diff-btn{transition:none;animation:none}
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="floating-orb"></div>
    <div class="floating-orb"></div>
    <div class="floating-orb"></div>
    <div class="toast" id="toast"></div>
    <div class="main-layout">
        <div class="game-wrapper" id="gameWrapper" tabindex="0">
            <div class="info-bar">
                <div class="score-display">
                    <i class="fas fa-bolt score-icon"></i>
                    <div><div class="score-label">得分</div><div class="score-value" id="scoreValue">0</div></div>
                </div>
                <div class="best-score">
                    <i class="fas fa-crown best-icon"></i>
                    <div><div class="best-label">最高</div><div class="best-value" id="bestValue">0</div></div>
                </div>
            </div>
            <div class="difficulty-bar">
                <span class="difficulty-label">难度</span>
                <div class="difficulty-group">
                    <button class="diff-btn" id="diffEasy" data-diff="easy">简单<span class="diff-info">1分/食物</span></button>
                    <button class="diff-btn active-normal" id="diffNormal" data-diff="normal">普通<span class="diff-info">2分/食物</span></button>
                    <button class="diff-btn" id="diffHard" data-diff="hard">困难<span class="diff-info">3分/食物</span></button>
                </div>
            </div>
            <div class="canvas-container" id="canvasContainer">
                <canvas id="gameCanvas"></canvas>
                <div class="overlay" id="startOverlay">
                    <div class="snake-deco"><span></span><span></span><span></span><span></span><span></span></div>
                    <div class="overlay-title accent">贪吃蛇</div>
                    <div class="overlay-subtitle">吞噬一切，不断进化</div>
                    <button class="game-btn btn-primary" id="startBtn">开始游戏</button>
                </div>
                <div class="overlay hidden" id="gameOverOverlay">
                    <div class="overlay-title danger">游戏结束</div>
                    <div class="final-score-text">最终得分</div>
                    <div class="final-score-number" id="finalScore">0</div>
                    <div class="final-difficulty" id="finalDifficulty"></div>
                    <div class="new-record hidden" id="newRecord">新纪录</div>
                    <button class="game-btn btn-primary" id="restartBtn">再来一局</button>
                </div>
            </div>
            <div class="focus-hint" id="focusHint">点击游戏区域以激活键盘控制</div>
            <div class="controls-hint">
                <div class="key-group">
                    <span class="key"><i class="fas fa-arrow-up"></i></span>
                    <span class="key"><i class="fas fa-arrow-down"></i></span>
                    <span class="key"><i class="fas fa-arrow-left"></i></span>
                    <span class="key"><i class="fas fa-arrow-right"></i></span>
                    <span style="margin-left:4px">移动</span>
                </div>
                <div class="key-group"><span class="key wide">Space</span><span>暂停</span></div>
                <div class="key-group"><span class="key">1</span><span class="key">2</span><span class="key">3</span><span>切换难度</span></div>
            </div>
            <div class="mobile-controls" id="mobileControls">
                <div class="mobile-btn empty"></div>
                <div class="mobile-btn" data-dir="up"><i class="fas fa-chevron-up"></i></div>
                <div class="mobile-btn empty"></div>
                <div class="mobile-btn" data-dir="left"><i class="fas fa-chevron-left"></i></div>
                <div class="mobile-btn" data-dir="down"><i class="fas fa-chevron-down"></i></div>
                <div class="mobile-btn" data-dir="right"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>
        <div class="history-panel">
            <div class="history-header">
                <i class="fas fa-scroll"></i>
                <span class="history-title">得分记录</span>
                <span class="history-count" id="historyCount">0 局</span>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty"><i class="fas fa-ghost"></i>还没有记录，开始第一局吧</div>
            </div>
        </div>
    </div>
    <script>
    (()=>{
        const GRID=20,CELL=25,SIZE=GRID*CELL;
        const DIFF={
            easy:{base:280,min:150,step:2,pts:1,label:'简单'},
            normal:{base:220,min:110,step:2,pts:2,label:'普通'},
            hard:{base:140,min:70,step:3,pts:3,label:'困难'}
        };
        const $=id=>document.getElementById(id);
        const canvas=$('gameCanvas'),ctx=canvas.getContext('2d');
        const container=$('canvasContainer'),startOv=$('startOverlay'),overOv=$('gameOverOverlay');
        const startBtn=$('startBtn'),restartBtn=$('restartBtn');
        const scoreEl=$('scoreValue'),bestEl=$('bestValue'),finalEl=$('finalScore'),finalDiff=$('finalDifficulty');
        const newRec=$('newRecord'),toast=$('toast'),wrapper=$('gameWrapper'),focusH=$('focusHint');
        const hList=$('historyList'),hCount=$('historyCount');
        const dBtns=document.querySelectorAll('.diff-btn');
        canvas.width=SIZE;canvas.height=SIZE;

        let snake=[],food={x:0,y:0},dir={x:1,y:0},nextDir={x:1,y:0};
        let score=0,best=0,running=false,paused=false,loop=null,speed=220;
        let particles=[],fPulse=0,curDiff='normal',eaten=0;
        let history=[],round=0;

        try{best=parseInt(localStorage.getItem('snakeBest')||'0');if(isNaN(best))best=0;}catch(e){best=0;}
        try{const s=localStorage.getItem('snakeHistory');if(s){history=JSON.parse(s);if(!Array.isArray(history))history=[];}
        const r=localStorage.getItem('snakeRound');if(r)round=parseInt(r)||0;}catch(e){history=[];round=0;}
        bestEl.textContent=best;
        if(history.length>0)renderH();

        wrapper.addEventListener('click',()=>wrapper.focus());
        container.addEventListener('click',()=>wrapper.focus());
        wrapper.addEventListener('focus',()=>focusH.classList.add('hidden'));
        wrapper.addEventListener('blur',()=>{if(running&&!paused)focusH.classList.remove('hidden');});

        function showT(m){toast.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}
        function rndPos(){return{x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)};}
        function onSnake(p){return snake.some(s=>s.x===p.x&&s.y===p.y);}
        function spawn(){let p,a=0;do{p=rndPos();a++;}while(onSnake(p)&&a<1000);food=p;}

        function setDiff(d,autoP){
            const prev=curDiff;curDiff=d;
            dBtns.forEach(b=>{b.classList.remove('active-easy','active-normal','active-hard');if(b.dataset.diff===d)b.classList.add('active-'+d);});
            if(running&&!paused&&autoP)toggleP();
            if(running){const c=DIFF[d];speed=Math.max(c.min,c.base-eaten*c.step);if(!paused){clearInterval(loop);loop=setInterval(step,speed);}}
            if(prev!==d){const c=DIFF[d];showT('难度切换为 '+c.label+'（'+c.pts+'分/食物）');}
        }
        dBtns.forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();setDiff(b.dataset.diff,true);wrapper.focus();}));

        function renderH(){
            hList.innerHTML='';
            if(!history.length){hList.innerHTML='<div class="history-empty"><i class="fas fa-ghost"></i>还没有记录，开始第一局吧</div>';hCount.textContent='0 局';return;}
            const hi=Math.max(...history.map(h=>h.score));
            [...history].reverse().forEach((e,i)=>{
                const isB=e.score===hi&&e.score>0;
                const el=document.createElement('div');el.className='history-item'+(isB?' is-best':'');
                el.style.animationDelay=i*.04+'s';
                const r=history.filter(x=>x.score>e.score).length+1;
                const dc=e.difficulty||'normal';
                el.innerHTML=`<div class="item-rank">${r}</div><div class="item-info"><div class="item-round">第 ${e.round} 局</div><div class="item-score">${e.score}</div></div><span class="item-difficulty ${dc}">${DIFF[dc]?DIFF[dc].label:'普通'}</span><i class="fas fa-crown item-crown ${isB?'':'hidden'}"></i>`;
                hList.appendChild(el);
            });
            hCount.textContent=history.length+' 局';
        }
        function addH(s,d){round++;history.push({round,score:s,difficulty:d,time:Date.now()});if(history.length>50)history=history.slice(-50);try{localStorage.setItem('snakeHistory',JSON.stringify(history));localStorage.setItem('snakeRound',round.toString());}catch(e){}renderH();}

        function mkP(x,y,c,n){for(let i=0;i<n;i++){const a=Math.PI*2*i/n+Math.random()*.5,s=1.5+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,dec:.02+Math.random()*.03,sz:2+Math.random()*3,c});}}
        function upP(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.life-=p.dec;if(p.life<=0)particles.splice(i,1);}}
        function drP(){particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.c;ctx.shadowColor=p.c;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.5,p.sz*p.life),0,Math.PI*2);ctx.fill();ctx.restore();});}

        function drGrid(){ctx.strokeStyle='rgba(75,85,99,.08)';ctx.lineWidth=.5;for(let i=0;i<=GRID;i++){const p=i*CELL;ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,SIZE);ctx.stroke();ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(SIZE,p);ctx.stroke();}}

        function drSnake(){
            const len=snake.length;
            snake.forEach((s,i)=>{
                const r=i/Math.max(1,len-1),x=s.x*CELL,y=s.y*CELL;
                const pad=i===0?1:2,rad=i===0?6:4;
                const cr=Math.round(16+(6-16)*r),cg=Math.round(185+(75-185)*r),cb=Math.round(129+(51-129)*r);
                ctx.save();
                if(i===0){ctx.shadowColor='rgba(16,185,129,.6)';ctx.shadowBlur=12;}
                ctx.fillStyle=`rgb(${cr},${cg},${cb})`;
                const cx=x+pad,cy=y+pad,cw=CELL-pad*2,ch=CELL-pad*2;
                ctx.beginPath();ctx.moveTo(cx+rad,cy);ctx.lineTo(cx+cw-rad,cy);ctx.quadraticCurveTo(cx+cw,cy,cx+cw,cy+rad);ctx.lineTo(cx+cw,cy+ch-rad);ctx.quadraticCurveTo(cx+cw,cy+ch,cx+cw-rad,cy+ch);ctx.lineTo(cx+rad,cy+ch);ctx.quadraticCurveTo(cx,cy+ch,cx,cy+ch-rad);ctx.lineTo(cx,cy+rad);ctx.quadraticCurveTo(cx,cy,cx+rad,cy);ctx.closePath();ctx.fill();
                if(i===0){
                    ctx.shadowBlur=0;ctx.fillStyle='#0a0e17';
                    const cX=x+CELL/2,cY=y+CELL/2;let e1x,e1y,e2x,e2y;
                    if(dir.x===1){e1x=cX+4;e1y=cY-5;e2x=cX+4;e2y=cY+5;}
                    else if(dir.x===-1){e1x=cX-4;e1y=cY-5;e2x=cX-4;e2y=cY+5;}
                    else if(dir.y===-1){e1x=cX-5;e1y=cY-4;e2x=cX+5;e2y=cY-4;}
                    else{e1x=cX-5;e1y=cY+4;e2x=cX+5;e2y=cY+4;}
                    ctx.beginPath();ctx.arc(e1x,e1y,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e2x,e2y,3,0,Math.PI*2);ctx.fill();
                    ctx.fillStyle='#e8ecf4';ctx.beginPath();ctx.arc(e1x+1,e1y-1,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e2x+1,e2y-1,1.2,0,Math.PI*2);ctx.fill();
                }
                ctx.restore();
            });
        }

        function drFood(){
            fPulse+=.06;const x=food.x*CELL+CELL/2,y=food.y*CELL+CELL/2;
            const bR=CELL/2-4,pR=bR+Math.sin(fPulse)*2;
            ctx.save();
            const gg=ctx.createRadialGradient(x,y,0,x,y,CELL);gg.addColorStop(0,'rgba(245,158,11,.25)');gg.addColorStop(1,'rgba(245,158,11,0)');
            ctx.fillStyle=gg;ctx.beginPath();ctx.arc(x,y,CELL,0,Math.PI*2);ctx.fill();
            ctx.shadowColor='rgba(245,158,11,.8)';ctx.shadowBlur=15;
            const fg=ctx.createRadialGradient(x-2,y-2,0,x,y,pR);fg.addColorStop(0,'#fbbf24');fg.addColorStop(1,'#f59e0b');
            ctx.fillStyle=fg;ctx.beginPath();ctx.arc(x,y,Math.max(1,pR),0,Math.PI*2);ctx.fill();
            ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(x-2,y-2,Math.max(.5,pR*.35),0,Math.PI*2);ctx.fill();
            ctx.restore();
        }

        function drDiffInfo(){
            const c=DIFF[curDiff],col={easy:'#34d399',normal:'#fbbf24',hard:'#f87171'};
            ctx.save();ctx.font='600 12px "Space Grotesk"';ctx.textAlign='left';ctx.textBaseline='top';
            ctx.fillStyle=col[curDiff];ctx.globalAlpha=.6;ctx.fillText(c.label+' '+c.pts+'x',8,8);ctx.restore();
        }

        function render(){
            ctx.fillStyle='#111827';ctx.fillRect(0,0,SIZE,SIZE);drGrid();
            if(running||particles.length>0){if(running){drFood();drDiffInfo();}drSnake();drP();upP();}
            if(paused){
                ctx.fillStyle='rgba(10,14,23,.6)';ctx.fillRect(0,0,SIZE,SIZE);
                ctx.fillStyle='#e8ecf4';ctx.font='600 28px "Space Grotesk"';ctx.textAlign='center';ctx.textBaseline='middle';
                ctx.fillText('已暂停',SIZE/2,SIZE/2-16);
                ctx.font='300 14px "Space Grotesk"';ctx.fillStyle='#4b5563';
                ctx.fillText('按空格继续',SIZE/2,SIZE/2+14);ctx.fillText('可点击上方按钮切换难度',SIZE/2,SIZE/2+36);
            }
            requestAnimationFrame(render);
        }

        function init(){
            const sx=Math.floor(GRID/4),sy=Math.floor(GRID/2);
            snake=[{x:sx,y:sy},{x:sx-1,y:sy},{x:sx-2,y:sy}];
            dir={x:1,y:0};nextDir={x:1,y:0};score=0;eaten=0;particles=[];fPulse=0;
            scoreEl.textContent='0';speed=DIFF[curDiff].base;spawn();
        }

        function step(){
            if(!running||paused)return;dir={...nextDir};
            const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
            if(h.x<0||h.x>=GRID||h.y<0||h.y>=GRID){gameOver();return;}
            if(onSnake(h)){gameOver();return;}
            snake.unshift(h);
            if(h.x===food.x&&h.y===food.y){
                const c=DIFF[curDiff];score+=c.pts;eaten++;
                scoreEl.textContent=score;scoreEl.classList.add('bump');setTimeout(()=>scoreEl.classList.remove('bump'),150);
                mkP(food.x*CELL+CELL/2,food.y*CELL+CELL/2,'#f59e0b',12);mkP(food.x*CELL+CELL/2,food.y*CELL+CELL/2,'#fbbf24',8);
                speed=Math.max(c.min,c.base-eaten*c.step);clearInterval(loop);loop=setInterval(step,speed);spawn();
            }else snake.pop();
        }

        function gameOver(){
            running=false;clearInterval(loop);container.classList.remove('active');container.classList.add('dead');
            mkP(snake[0].x*CELL+CELL/2,snake[0].y*CELL+CELL/2,'#ef4444',20);mkP(snake[0].x*CELL+CELL/2,snake[0].y*CELL+CELL/2,'#f87171',10);
            addH(score,curDiff);let isNew=false;
            if(score>best){best=score;try{localStorage.setItem('snakeBest',best.toString());}catch(e){}bestEl.textContent=best;isNew=true;}
            setTimeout(()=>{
                finalEl.textContent=score;const c=DIFF[curDiff];
                finalDiff.textContent='难度：'+c.label+'（'+c.pts+'分/食物）';
                if(isNew&&score>0)newRec.classList.remove('hidden');else newRec.classList.add('hidden');
                overOv.classList.remove('hidden');
            },600);
        }

        function startGame(){
            init();startOv.classList.add('hidden');overOv.classList.add('hidden');
            container.classList.remove('dead');container.classList.add('active');
            running=true;paused=false;focusH.classList.add('hidden');
            loop=setInterval(step,speed);wrapper.focus();
        }

        function toggleP(){
            if(!running)return;paused=!paused;
            if(paused){clearInterval(loop);showT('游戏已暂停 — 可切换难度');}
            else{loop=setInterval(step,speed);showT('继续游戏');}
        }

        function hDir(d){
            if(!running||paused)return;
            const opp={up:'down',down:'up',left:'right',right:'left'};
            const dm={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
            const n=dm[d];if(!n)return;
            const cur=Object.keys(dm).find(k=>dm[k].x===dir.x&&dm[k].y===dir.y);
            if(opp[d]===cur)return;nextDir={...n};
        }

        function hKey(e){
            const dm={'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};
            if(e.key===' '){e.preventDefault();if(running)toggleP();else startGame();return;}
            if(e.key==='1'){setDiff('easy',true);return;}if(e.key==='2'){setDiff('normal',true);return;}if(e.key==='3'){setDiff('hard',true);return;}
            if(dm[e.key]){e.preventDefault();hDir(dm[e.key]);return;}
            if(e.key==='p'||e.key==='P'){if(running)toggleP();}
        }

        wrapper.addEventListener('keydown',e=>{hKey(e);e.stopPropagation();});
        document.addEventListener('keydown',hKey);

        document.querySelectorAll('.mobile-btn[data-dir]').forEach(b=>{
            b.addEventListener('touchstart',e=>{e.preventDefault();hDir(b.dataset.dir);});
            b.addEventListener('click',()=>hDir(b.dataset.dir));
        });
        startBtn.addEventListener('click',e=>{e.stopPropagation();startGame();});
        restartBtn.addEventListener('click',e=>{e.stopPropagation();startGame();});

        let tx=0,ty=0;
        canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
        canvas.addEventListener('touchend',e=>{
            const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
            if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
            if(Math.abs(dx)>Math.abs(dy))hDir(dx>0?'right':'left');else hDir(dy>0?'down':'up');
        },{passive:true});

        render();
    })();
    </script>
</body>
</html>
